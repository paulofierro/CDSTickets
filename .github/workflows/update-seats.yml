name: Update seats.json

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-seats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python fetch_seats.py

      - name: Append history snapshot
        run: python append_history.py

      - name: Commit changes
        run: |
          if git diff --quiet -- seats.json history.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seats.json history.json
          git commit -m "Update seats.json"
          git push
